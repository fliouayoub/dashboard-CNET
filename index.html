<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Suivi Cortex → Cristal-NET</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {font-family:'Segoe UI';background:#eef2f7;margin:0;}

header {
background:#1f2c42;
color:white;
padding:15px;
text-align:center;
}

.progress-container {
background:white;
padding:12px;
border-radius:8px;
margin-bottom:15px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.progress-bar {
width:100%;
height:20px;
background:#e5e7eb;
border-radius:10px;
overflow:hidden;
}

#progressFill {
height:100%;
width:0%;
background:linear-gradient(90deg,#3b82f6,#10b981);
transition:width 0.5s ease;
}

#progressLabel {
margin-bottom:6px;
font-weight:bold;
text-align:center;
}

.container {padding:15px;max-width:1200px;margin:auto;}

#statusMessage{
background: linear-gradient(90deg, #fff3cd, #ffe69c);
color:#856404;
padding:10px;
margin:10px 0;
border-radius:10px;
text-align:center;
font-weight:bold;
}

.filters{display:flex;gap:10px;margin-bottom:15px;}
select{padding:6px;border-radius:6px;}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
margin-bottom:15px;
}

.card{
background:white;
padding:12px;
border-radius:8px;
text-align:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.grid{
display:grid;
grid-template-columns:1.5fr 1fr;
gap:10px;
margin-bottom:10px;
}

canvas{
background:white;
padding:10px;
border-radius:8px;
height:250px !important;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:6px;
text-align:center;
}

th{
background:#1f2c42;
color:white;
cursor:pointer;
}

tr:nth-child(even){background:#f5f5f5;}

tr.done{background:#e8f5e9;}
tr.in_progress{background:#fff8e1;}
tr.not_started{background:#f3f4f6;}
</style>
</head>

<body>

<header>
<h2>Chargement Cortex → Cristal-NET</h2>
</header>

<div class="container">

<div id="statusMessage">
⏳ Chargement en cours de Microbiologie - 2024 - Antoine Labelle
</div>


<!-- Barre progression -->
<div class="progress-container">
  <div id="progressLabel"></div>
  <div class="progress-bar">
    <div id="progressFill"></div>
  </div>
</div>

<!-- FILTRES -->
<div class="filters">
<select id="yearFilter" onchange="update()">
<option value="all">Toutes années</option>
</select>

<select id="siteFilter" onchange="update()">
<option value="all">Tous sites</option>
<option>Antoine-Labelle</option>
<option>Argenteuil</option>
</select>

<select id="voletFilter" onchange="update()">
<option value="all">Tous volets</option>
<option>Microbiologie</option>
<option>Biochimie</option>
</select>
</div>

<!-- KPI -->
<div class="cards">
<div class="card"><b id="kpiTx"></b><br>Transactions</div>
<div class="card"><b id="kpiRej"></b><br>Rejets</div>
<div class="card"><b id="kpiFil"></b><br>Filtrées</div>
<div class="card"><b id="kpiRate"></b><br>Taux rejet</div>
<div class="card"><b id="kpiFilRate"></b><br>Taux filtrage</div>
</div>



<div class="grid">
<canvas id="chart1"></canvas>
<canvas id="chart2"></canvas>
</div>

<table>
<thead>
<tr>
<th onclick="sort('year')">Année</th>
<th onclick="sort('site')">Site</th>
<th onclick="sort('volet')">Volet</th>
<th onclick="sort('tx')">Tx</th>
<th onclick="sort('rej')">Rejets</th>
<th onclick="sort('fil')">Filtrées</th>
<th>Statut</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<script>

// ================= DATA =================
let data = [

/*
{year:2015, site:"Argenteuil", volet:"Microbiologie", tx:16646, rej:22, fil:322, status:"done"},
{year:2015, site:"Antoine-Labelle", volet:"Microbiologie", tx:34667, rej:238, fil:729, status:"done"},
{year:2016, site:"Argenteuil", volet:"Microbiologie", tx:20000, rej:0, fil:0, status:"in_progress"},
{year:2017, site:"Argenteuil", volet:"Microbiologie", tx:33564, rej:0, fil:0, status:"not_started"}

*/
 // Biochimie Antoine-Labelle
  
  {year:2015, site:"Antoine-Labelle", volet:"Biochimie", tx:132257, rej:0, fil:0, status:"not_started"},
  {year:2016, site:"Antoine-Labelle", volet:"Biochimie", tx:0, rej:0, fil:0, status:"not_started"},
  {year:2017, site:"Antoine-Labelle", volet:"Biochimie", tx:0, rej:0, fil:0, status:"not_started"},
  {year:2018, site:"Antoine-Labelle", volet:"Biochimie", tx:138962, rej:0, fil:0, status:"not_started"},
  {year:2019, site:"Antoine-Labelle", volet:"Biochimie", tx:139590, rej:0, fil:0, status:"not_started"},
  {year:2020, site:"Antoine-Labelle", volet:"Biochimie", tx:146042, rej:0, fil:0, status:"not_started"},
  {year:2021, site:"Antoine-Labelle", volet:"Biochimie", tx:159984, rej:0, fil:0, status:"not_started"},
  {year:2022, site:"Antoine-Labelle", volet:"Biochimie", tx:158608, rej:0, fil:0, status:"not_started"},
  {year:2023, site:"Antoine-Labelle", volet:"Biochimie", tx:162238, rej:0, fil:0, status:"not_started"},
  {year:2024, site:"Antoine-Labelle", volet:"Biochimie", tx:178200, rej:0, fil:0, status:"not_started"},
  {year:2025, site:"Antoine-Labelle", volet:"Biochimie", tx:121924, rej:0, fil:0, status:"not_started"},
 
 // Biochimie Argenteuil
 
  {year:2015, site:"Argenteuil", volet:"Biochimie", tx:113407, rej:376, fil:3030, status:"done"},
  {year:2016, site:"Argenteuil", volet:"Biochimie", tx:106968, rej:0, fil:0, status:"not_started"},
  {year:2017, site:"Argenteuil", volet:"Biochimie", tx:106508, rej:0, fil:0, status:"not_started"},
  {year:2018, site:"Argenteuil", volet:"Biochimie", tx:114518, rej:0, fil:0, status:"not_started"},
  {year:2019, site:"Argenteuil", volet:"Biochimie", tx:117388, rej:0, fil:0, status:"not_started"},
  {year:2020, site:"Argenteuil", volet:"Biochimie", tx:103065, rej:0, fil:0, status:"not_started"},
  {year:2021, site:"Argenteuil", volet:"Biochimie", tx:122952, rej:0, fil:0, status:"not_started"},
  {year:2022, site:"Argenteuil", volet:"Biochimie", tx:123298, rej:0, fil:0, status:"not_started"},
  {year:2023, site:"Argenteuil", volet:"Biochimie", tx:130633, rej:0, fil:0, status:"not_started"},
  {year:2024, site:"Argenteuil", volet:"Biochimie", tx:137971, rej:0, fil:0, status:"not_started"},
  {year:2025, site:"Argenteuil", volet:"Biochimie", tx:83340, rej:0, fil:0, status:"not_started"},
 
 // Microbiologie Antoine-Labelle
 
  {year:2015, site:"Antoine-Labelle", volet:"Microbiologie", tx:34667, rej:238, fil:729, status:"done"},
  {year:2016, site:"Antoine-Labelle", volet:"Microbiologie", tx:35553, rej:128, fil:718, status:"done"},
  {year:2017, site:"Antoine-Labelle", volet:"Microbiologie", tx:37468, rej:8, fil:608, status:"done"},
  {year:2018, site:"Antoine-Labelle", volet:"Microbiologie", tx:38170, rej:2, fil:701, status:"done"},
  {year:2019, site:"Antoine-Labelle", volet:"Microbiologie", tx:38371, rej:2, fil:1215, status:"done"},
  {year:2020, site:"Antoine-Labelle", volet:"Microbiologie", tx:30542, rej:2, fil:793, status:"done"},
  {year:2021, site:"Antoine-Labelle", volet:"Microbiologie", tx:31362, rej:2, fil:1012, status:"done"},
  {year:2022, site:"Antoine-Labelle", volet:"Microbiologie", tx:32265, rej:2, fil:905, status:"done"},
  {year:2023, site:"Antoine-Labelle", volet:"Microbiologie", tx:35578, rej:5, fil:1241, status:"done"},
  {year:2024, site:"Antoine-Labelle", volet:"Microbiologie", tx:32190, rej:0, fil:0, status:"in_progress"},
  {year:2025, site:"Antoine-Labelle", volet:"Microbiologie", tx:21704, rej:0, fil:0, status:"not_started"},

 // Microbiologie Argenteuil
 
  {year:2015, site:"Argenteuil", volet:"Microbiologie", tx:16646, rej:22, fil:322, status:"done"},
  {year:2016, site:"Argenteuil", volet:"Microbiologie", tx:16172, rej:0, fil:0, status:"not_started"},
  {year:2017, site:"Argenteuil", volet:"Microbiologie", tx:17295, rej:0, fil:0, status:"not_started"},
  {year:2018, site:"Argenteuil", volet:"Microbiologie", tx:17501, rej:0, fil:0, status:"not_started"},
  {year:2019, site:"Argenteuil", volet:"Microbiologie", tx:16638, rej:0, fil:0, status:"not_started"},
  {year:2020, site:"Argenteuil", volet:"Microbiologie", tx:12244, rej:0, fil:0, status:"not_started"},
  {year:2021, site:"Argenteuil", volet:"Microbiologie", tx:14222, rej:0, fil:0, status:"not_started"},
  {year:2022, site:"Argenteuil", volet:"Microbiologie", tx:14575, rej:0, fil:0, status:"not_started"},
  {year:2023, site:"Argenteuil", volet:"Microbiologie", tx:17370, rej:0, fil:0, status:"not_started"},
  {year:2024, site:"Argenteuil", volet:"Microbiologie", tx:16008, rej:0, fil:0, status:"not_started"},
  {year:2025, site:"Argenteuil", volet:"Microbiologie", tx:7131, rej:0, fil:0, status:"not_started"}




];

// remplir années
let years = [...new Set(data.map(d => d.year))];
years.forEach(y=>{
yearFilter.innerHTML += `<option>${y}</option>`;
});

// tri
let asc=true;
function sort(col){
asc=!asc;
data.sort((a,b)=>{
if(typeof a[col]==="string")
return asc?a[col].localeCompare(b[col]):b[col].localeCompare(a[col]);
return asc?a[col]-b[col]:b[col]-a[col];
});
update();
}

let c1,c2;

function update(){

let yf=yearFilter.value;
let sf=siteFilter.value;
let vf=voletFilter.value;

// filtre affichage
let filtered = data.filter(d=>
(yf==="all"||d.year==yf)&&
(sf==="all"||d.site===sf)&&
(vf==="all"||d.volet===vf)
);

// KPI = seulement terminés
let completed = filtered.filter(d=>d.status==="done");

// ================= KPI =================
let t=0,r=0,f=0;
table.innerHTML="";

completed.forEach(d=>{
t+=d.tx;
r+=d.rej;
f+=d.fil;
});

kpiTx.innerText=t.toLocaleString();
kpiRej.innerText=r.toLocaleString();
kpiFil.innerText=f.toLocaleString();
kpiRate.innerText=t?((r/t)*100).toFixed(2)+"%":"0%";
kpiFilRate.innerText=t?((f/t)*100).toFixed(2)+"%":"0%";

// ================= TABLE =================
filtered.forEach(d=>{

let cls =
d.status==="done" ? "done" :
d.status==="in_progress" ? "in_progress" :
"not_started";

let label =
d.status==="done" ? "✅ Terminé" :
d.status==="in_progress" ? "⏳ En cours" :
"⏸️ Non débuté";

table.innerHTML+=`
<tr class="${cls}">
<td>${d.year}</td>
<td>${d.site}</td>
<td>${d.volet}</td>
<td>${d.tx}</td>
<td>${d.rej}</td>
<td>${d.fil}</td>
<td>${label}</td>
</tr>`;
});

// ================= GRAPH 1 =================
let yearsData = [...new Set(completed.map(d=>d.year))].sort();
let sites = [...new Set(completed.map(d=>d.site))];
let volets = [...new Set(completed.map(d=>d.volet))];

let colors = {
"Antoine-Labelle":"#3b82f6",
"Argenteuil":"#10b981"
};

function lighten(color, p){
let n=parseInt(color.replace("#",""),16),
a=Math.round(2.55*p),
r=(n>>16)+a,
g=(n>>8&0xff)+a,
b=(n&0xff)+a;
return "#"+(0x1000000+
(r<255?r:255)*0x10000+
(g<255?g:255)*0x100+
(b<255?b:255)).toString(16).slice(1);
}

let datasets=[];

sites.forEach(site=>{
volets.forEach((volet,i)=>{

let vals = yearsData.map(y=>{
let sum=0;
completed.forEach(d=>{
if(d.year==y && d.site===site && d.volet===volet)
sum+=d.tx;
});
return sum;
});

let col = i===0 ? colors[site] : lighten(colors[site],25);

datasets.push({
label:site+" - "+volet,
data:vals,
backgroundColor:col
});

});
});

if(c1)c1.destroy();

c1=new Chart(chart1,{
type:'bar',
data:{labels:yearsData,datasets},
options:{responsive:true}
});

// ================= GRAPH 2 =================
if(c2)c2.destroy();

c2=new Chart(chart2,{
type:'doughnut',
data:{
labels:["Rejets","Filtrées","OK"],
datasets:[{data:[r,f,Math.max(0,t-r-f)]}]
}
});


// ================= PROGRESSION GLOBALE =================

// total toutes données
let totalAll = 0;

// total terminé
let totalDone = 0;

filtered.forEach(d=>{
totalAll += d.tx;
});

completed.forEach(d=>{
totalDone += d.tx;
});

let percent = totalAll ? (totalDone / totalAll) * 100 : 0;

// mise à jour UI
progressFill.style.width = percent.toFixed(1) + "%";
progressLabel.innerText = 
`Progression globale de chargement: ${percent.toFixed(1)}%`;

}

update();

</script>

</body>
</html>
